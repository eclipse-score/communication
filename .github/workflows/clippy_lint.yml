# Workflow: Clippy PR check — thin wrapper around lint.yml
#
# Kept for backward compatibility (branch-protection rules, etc.).
# All logic lives in lint.yml; this file simply calls it with linter: clippy.

name: Clippy Check

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the clippy findings artifact"
        value: ${{ jobs.run-lint.outputs.artifact-name }}
      errors:
        description: "Total clippy error count"
        value: ${{ jobs.run-lint.outputs.errors }}
      warnings:
        description: "Total clippy warning count"
        value: ${{ jobs.run-lint.outputs.warnings }}
      conclusion:
        description: "Job conclusion: success or failure"
        value: ${{ jobs.run-lint.outputs.conclusion }}

jobs:
  run-lint:
    uses: ./.github/workflows/lint.yml
    with:
      bazel-command: build
      bazel-config: clippy
      bazel-targets: //score/...
      findings-glob: "*.AspectRulesLintClippy.out"
      changed-files-regex: '\.rs$'
      error-pattern: '^error(\[|:)'
      warning-pattern: '^warning(\[|:)'
      location-pattern: '^\s+-->'
      artifact-name: clippy-findings
      cache-save: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      actions: write
