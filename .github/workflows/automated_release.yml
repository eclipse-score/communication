# Workflow configuration for automated release process
# This workflow is triggered manually via workflow_dispatch and expects a release tag input.
# It creates a draft release, runs all tests, and either leaves or removes the draft release based on results.

name: Automated Release Process
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create (example: v1.2.3)"
        required: true
        type: string

env:
  ANDROID_HOME: ""
  ANDROID_SDK_ROOT: ""
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-draft-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
      release-url: ${{ steps.create-release.outputs.url }}
      release-tag: ${{ steps.release-tag.outputs.release-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set release tag from workflow dispatch input
        id: release-tag
        run: |
          echo "Release version tag: ${{ github.event.inputs.release_tag }}"
          echo "release-tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.release-tag }}
          name: ${{ steps.release-tag.outputs.release-tag }}
          body_path: .github/RELEASE_TEMPLATE.md
          draft: true
          prerelease: false
          target_commitish: ${{ github.sha }}

  run-host-quality:
    needs: create-draft-release
    uses: ./.github/workflows/build_and_test_host.yml
    permissions:
      contents: read
      actions: write
    secrets:
      UBUNTU_SNAPSHOT_MIRROR_URL: ${{ secrets.UBUNTU_SNAPSHOT_MIRROR_URL }}

  run-build-and-test-qnx:
    needs: create-draft-release
    uses: ./.github/workflows/build_and_test_qnx.yml
    permissions:
      contents: read
      pull-requests: read
      actions: write
    secrets:
      SCORE_QNX_LICENSE: ${{ secrets.SCORE_QNX_LICENSE }}
      SCORE_QNX_USER: ${{ secrets.SCORE_QNX_USER }}
      SCORE_QNX_PASSWORD: ${{ secrets.SCORE_QNX_PASSWORD }}
      UBUNTU_SNAPSHOT_MIRROR_URL: ${{ secrets.UBUNTU_SNAPSHOT_MIRROR_URL }}

  run-coverage-report:
    needs: create-draft-release
    uses: ./.github/workflows/_coverage_report.yml
    permissions:
      contents: read
      actions: write
    secrets:
      UBUNTU_SNAPSHOT_MIRROR_URL: ${{ secrets.UBUNTU_SNAPSHOT_MIRROR_URL }}

  run-docs-build:
    needs: create-draft-release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Bazel
        uses: ./.github/actions/00_infrastructure/prepare_bazel_environment
        with:
          disk-cache: build_docs
          ubuntu-snapshot-mirror-url: ${{ secrets.UBUNTU_SNAPSHOT_MIRROR_URL }}

      - name: Build and package Sphinx documentation
        uses: ./.github/actions/10_docs/build_sphinx_package
        with:
          docs-version: ${{ needs.create-draft-release.outputs.release-tag }}
          docs-base-url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          lobster-source-root: https://github.com/${{ github.repository }}/blob/main/
          repository-name: ${{ github.event.repository.name }}
          output-dir: docs_output
          archive-name: docs-${{ needs.create-draft-release.outputs.release-tag }}.tar.gz

      - name: Upload docs archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}_docs_release_${{ needs.create-draft-release.outputs.release-tag }}
          path: docs-${{ needs.create-draft-release.outputs.release-tag }}.tar.gz

  upload-coverage-report:
    needs:
      - create-draft-release
      - run-coverage-report
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Abort if coverage failed
        if: needs.run-coverage-report.result != 'success'
        run: |
          echo "::error::Coverage failed — aborting release. Draft will be deleted."
          exit 1

      - name: Download coverage report artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}_coverage_report_${{ github.sha }}
          path: ./

      - name: Upload coverage report to existing draft release
        run: |
          gh release upload "${{ needs.create-draft-release.outputs.release-tag }}" "${{ github.event.repository.name }}_coverage_report_${{ github.sha }}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-docs-report:
    needs:
      - create-draft-release
      - run-docs-build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Abort if docs build failed
        if: needs.run-docs-build.result != 'success'
        run: |
          echo "::error::Documentation build failed — aborting release. Draft will be deleted."
          exit 1

      - name: Download docs archive artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.repository.name }}_docs_release_${{ needs.create-draft-release.outputs.release-tag }}
          path: ./

      - name: Upload docs archive to existing draft release
        run: |
          gh release upload "${{ needs.create-draft-release.outputs.release-tag }}" "docs-${{ needs.create-draft-release.outputs.release-tag }}.tar.gz" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    runs-on: ubuntu-24.04
    needs:
      - create-draft-release
      - run-host-quality
      - run-build-and-test-qnx
      - run-coverage-report
      - run-docs-build
      - upload-coverage-report
      - upload-docs-report
    if: ${{ success() }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Report success
        run: |
          echo "All workflows succeeded. Draft release ${{ needs.create-draft-release.outputs.release-tag }} is ready for manual publishing."

  delete-release-on-failure:
    runs-on: ubuntu-24.04
    needs:
      - create-draft-release
      - run-host-quality
      - run-build-and-test-qnx
      - run-coverage-report
      - run-docs-build
      - upload-coverage-report
      - upload-docs-report
    if: ${{ failure() || cancelled() }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Delete draft release due to failure
        run: |
          gh release delete ${{ needs.create-draft-release.outputs.release-tag }} --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report failure
        run: |
          echo "One or more workflows failed. Draft release has been deleted."
          exit 1
