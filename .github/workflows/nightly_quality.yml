# Workflow: Run nightly quality jobs and publish results to GitHub Pages.
#
# Runs every night at midnight UTC:
#   - Coverage  : full C++ test suite with gcov/lcov → HTML report
#   - Clang-Tidy: static analysis across all C++ targets → findings text file
#   - CodeQL    : MISRA C++ compliance analysis → CSV findings
#
# After all jobs complete, deploy-quality-reports:
#   1. Downloads the coverage HTML artifact, clang-tidy findings, and CodeQL CSV
#   2. Runs `bazel run //quality/dashboard:generate_dashboard` to produce the KPI dashboard
#   3. Uploads everything as nightly-quality-reports artifact for docs.yml to deploy
#
# Deployed URL structure:
#   https://eclipse-score.github.io/communication/latest/quality/index.html               ← dashboard
#   https://eclipse-score.github.io/communication/latest/quality/coverage/index.html      ← lcov HTML
#   https://eclipse-score.github.io/communication/latest/quality/clang_tidy_findings.txt  ← raw findings
#   https://eclipse-score.github.io/communication/latest/quality/codeql/index.html       ← CodeQL report

name: Nightly Quality Jobs

on:
  schedule:
    - cron: "0 0 * * *" # every day at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_HOME: ""
  ANDROID_SDK_ROOT: ""
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --------------------------------------------------------------------
  # Quality job 1: Coverage
  # --------------------------------------------------------------------
  run-coverage:
    uses: ./.github/workflows/coverage_report.yml
    permissions:
      contents: read

  # --------------------------------------------------------------------
  # Quality job 2: Clang-Tidy
  # --------------------------------------------------------------------
  run-clang-tidy:
    uses: ./.github/workflows/clang_tidy.yml
    permissions:
      contents: read

  # --------------------------------------------------------------------
  # Quality job 3: CodeQL (MISRA C++)
  # --------------------------------------------------------------------
  run-codeql:
    uses: ./.github/workflows/codeql.yml
    permissions:
      contents: read
      security-events: write

  # --------------------------------------------------------------------
  # Collect results, build the dashboard, upload artifact for docs.yml
  # --------------------------------------------------------------------
  deploy-quality-reports:
    needs: [run-coverage, run-clang-tidy, run-codeql]
    # Always run even if individual quality jobs fail, so the dashboard
    # still reflects which jobs passed and which failed.
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Bazel with shared caching
        uses: castler/setup-bazel@cache-optimized
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-optimized: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - name: Allow linux-sandbox
        id: setup
        uses: ./actions/unblock_user_namespace_for_linux_sandbox

      # ------------------------------------------------------------------
      # Download Coverage artifacts (only if the upstream job succeeded)
      # ------------------------------------------------------------------
      - name: Download coverage artifact
        id: download-coverage
        if: needs.run-coverage.outputs.conclusion == 'success'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-coverage.outputs.artifact-name }}
          path: /tmp/coverage_zip

      # ------------------------------------------------------------------
      # Extract coverage artifact to a known location for the dashboard generator
      # ------------------------------------------------------------------
      - name: Extract coverage HTML report
        if: needs.run-coverage.outputs.conclusion == 'success' && steps.download-coverage.outcome == 'success'
        run: |
          bash quality/scripts/extract_coverage_artifact.sh \
            /tmp/coverage_zip \
            "${GITHUB_WORKSPACE}/_quality/coverage"

      # ------------------------------------------------------------------
      # Download clang-tidy findings artifact
      # ------------------------------------------------------------------
      - name: Download clang-tidy findings
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-clang-tidy.outputs.artifact-name }}
          path: /tmp/clang_tidy

      - name: Copy clang-tidy findings into quality output
        if: always()
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/_quality"
          if [[ -f /tmp/clang_tidy/clang_tidy_findings.txt ]]; then
            cp /tmp/clang_tidy/clang_tidy_findings.txt \
               "${GITHUB_WORKSPACE}/_quality/clang_tidy_findings.txt"
          else
            echo "::warning::clang_tidy_findings.txt not found in downloaded artifact; skipping copy."
          fi

      # ------------------------------------------------------------------
      # Download CodeQL CSV artifact
      # ------------------------------------------------------------------
      - name: Download CodeQL CSV artifact
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.run-codeql.outputs.artifact-name }}
          path: /tmp/codeql

      - name: Copy CodeQL CSV into quality output
        if: always()
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/_quality"
          if [[ -f /tmp/codeql/codeql-nightly.csv ]]; then
            cp /tmp/codeql/codeql-nightly.csv \
               "${GITHUB_WORKSPACE}/_quality/codeql_findings.csv"
          else
            echo "::warning::codeql-nightly.csv not found; skipping copy."
          fi

      # ------------------------------------------------------------------
      # Generate coverage KPI dashboard via generate_dashboard py_binary
      # ------------------------------------------------------------------
      - name: Generate quality dashboard
        if: always() && steps.setup.outcome == 'success'
        run: |
          # Pass LCOV data and clang-tidy findings, generate_dashboard handles
          # absent files gracefully (shows N/A for that metric).
          bazel run //quality/dashboard:generate_dashboard -- \
            --lcov     /tmp/coverage_zip/extracted/artifacts/coverage_report.dat \
            --clang-tidy /tmp/clang_tidy/clang_tidy_findings.txt \
            --codeql-csv /tmp/codeql/codeql-nightly.csv \
            --codeql-html "${GITHUB_WORKSPACE}/_quality/codeql/index.html" \
            --html     "${GITHUB_WORKSPACE}/_quality/index.html" \
            --github-summary

          echo "Dashboard generated. Contents of _quality/:"
          find "${GITHUB_WORKSPACE}/_quality" -type f | sort

      # ------------------------------------------------------------------
      # Upload all quality reports as a single artifact for docs.yml to
      # pick up and deploy as part of the unified Sphinx site.
      # ------------------------------------------------------------------
      - name: Upload quality reports artifact
        if: always() && steps.setup.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-quality-reports
          path: _quality/
          retention-days: 7

      - name: Print dashboard URL
        if: always()
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "::notice::Quality reports will be published at https://${OWNER}.github.io/${REPO}/latest/quality/index.html once deploy_docs.yml completes."
