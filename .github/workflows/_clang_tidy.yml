name: "Clang-Tidy Check"

on:
  workflow_call:
    inputs:
      cache-mode:
        description: "Cache mode override (empty = auto-compute from event context)."
        type: string
        default: ""
      fetch-only:
        description: "When true, runs --nobuild to fetch dependencies only."
        type: string
        default: "false"

jobs:
  clang-tidy:
    name: Build & Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/00_infrastructure/prepare_bazel_environment
        with:
          disk-cache: ${{ inputs.fetch-only != 'true' && 'clang_tidy' || '' }}
          cache-mode: ${{ inputs.cache-mode }}

      - name: Fetch dependencies (--nobuild)
        if: inputs.fetch-only == 'true'
        run: bazel build --nobuild --config=clang-tidy //...

      - name: Run clang-tidy via Bazel
        if: inputs.fetch-only != 'true'
        id: run-clang-tidy
        run: |
          bazel test --config=clang-tidy //... 2>&1 | tee clang_tidy_raw.log || true

      - name: Collect findings
        if: inputs.fetch-only != 'true'
        id: findings
        run: |
          ERRORS=$(find -L bazel-bin -name "*.AspectRulesLintClangTidy.out" 2>/dev/null \
            | xargs cat 2>/dev/null \
            | grep -c "error:" || true)
          WARNINGS=$(find -L bazel-bin -name "*.AspectRulesLintClangTidy.out" 2>/dev/null \
            | xargs cat 2>/dev/null \
            | grep -c "warning:" || true)
          TOTAL=$((ERRORS + WARNINGS))

          CHANGED_CPP=$(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD" 2>/dev/null \
            | grep -E '\.(cpp|h|cc|cxx|hpp)$' || true)

          if [[ -z "$CHANGED_CPP" ]]; then
            ERRORS_BLOCKING=0
          else
            PATTERN=$(echo "$CHANGED_CPP" | tr '\n' '|' | sed 's/|$//')
            ERRORS_BLOCKING=$(find -L bazel-bin -name "*.AspectRulesLintClangTidy.out" 2>/dev/null \
              | xargs cat 2>/dev/null \
              | grep -E "(${PATTERN})" \
              | grep -c "error:" || true)
          fi

          echo "errors=${ERRORS}"                   >> $GITHUB_OUTPUT
          echo "warnings=${WARNINGS}"               >> $GITHUB_OUTPUT
          echo "total=${TOTAL}"                     >> $GITHUB_OUTPUT
          echo "errors_blocking=${ERRORS_BLOCKING}" >> $GITHUB_OUTPUT

          find -L bazel-bin -name "*.AspectRulesLintClangTidy.out" 2>/dev/null \
            | xargs cat 2>/dev/null > clang_tidy_findings.txt || true

          if [[ ! -s clang_tidy_findings.txt ]]; then
            {
              echo "No clang-tidy findings were produced for this run."
              echo "errors=${ERRORS} warnings=${WARNINGS} total=${TOTAL}"
            } > clang_tidy_findings.txt
          fi

          grep "error:" clang_tidy_findings.txt > clang_tidy_errors.txt || true

          {
            echo "## Clang-Tidy Results"
            echo ""
            echo "| Metric | Count |"
            echo "|--------|------:|"
            echo "| :x: Errors | **${ERRORS}** |"
            echo "| :warning: Warnings | **${WARNINGS}** |"
            echo "| Total | **${TOTAL}** |"
            if [[ "${ERRORS_BLOCKING}" -gt 0 ]]; then
              echo ""
              echo "> :x: **Check failed** — clang-tidy errors found in changed files. Fix before merging."
              echo ""
              echo "### First 20 errors in changed files"
              echo '```'
              head -20 clang_tidy_errors.txt || true
              echo '```'
            else
              echo ""
              echo "> :white_check_mark: **Check passed** — no clang-tidy errors in changed files."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload clang-tidy findings as artifact
        if: always() && inputs.fetch-only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-findings
          path: |
            clang_tidy_findings.txt
            clang_tidy_errors.txt
            clang_tidy_raw.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail check if clang-tidy errors found in changed files
        if: inputs.fetch-only != 'true' && (github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'merge_group') && steps.findings.outputs.errors_blocking != '0'
        run: |
          echo "::error::Clang-tidy found ${{ steps.findings.outputs.errors_blocking }} error(s) in changed files. See the 'clang-tidy-findings' artifact for details."
          echo ""
          echo "=== Clang-tidy errors ==="
          cat clang_tidy_errors.txt || true
          exit 1
