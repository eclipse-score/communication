name: "Coverage Report"

on:
  workflow_call:
    inputs:
      cache-mode:
        description: "Cache mode override (empty = auto-compute from event context)."
        type: string
        default: ""
      fetch-only:
        description: "When true, runs --nobuild to fetch dependencies only."
        type: string
        default: "false"
    secrets:
      UBUNTU_SNAPSHOT_MIRROR_URL:
        required: false

jobs:
  coverage:
    name: Build & Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/00_infrastructure/prepare_bazel_environment
        with:
          disk-cache: ${{ inputs.fetch-only != 'true' && 'coverage_report' || '' }}
          cache-mode: ${{ inputs.cache-mode }}
          ubuntu-snapshot-mirror-url: ${{ secrets.UBUNTU_SNAPSHOT_MIRROR_URL }}

      - name: Fetch dependencies (--nobuild)
        if: inputs.fetch-only == 'true'
        run: bazel build --nobuild //...

      - name: Run coverage
        if: inputs.fetch-only != 'true'
        id: run-coverage
        run: bazel coverage //... --build_tests_only

      - name: Generate coverage report
        if: inputs.fetch-only != 'true' && steps.run-coverage.outcome == 'success'
        id: generate-report
        run: |
          bazel run //quality/coverage:generate_coverage_html -- \
            --archive "${{ github.event.repository.name }}_coverage_report_${{ github.sha }}" \
            cpp_coverage_linux

      - name: Upload coverage artifacts
        if: inputs.fetch-only != 'true' && steps.generate-report.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}_coverage_report_${{ github.sha }}
          path: ${{ github.event.repository.name }}_coverage_report_${{ github.sha }}.zip
