name: Clippy checks
permissions:
  contents: read
  actions: write
on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  workflow_call:
jobs:
  lint-clippy:
    uses: eclipse-score/cicd-workflows/.github/workflows/static-analysis.yml@af347722c7ae3ed85518895c11268d96ac728f62
    with:
      bazel-targets: "//score/..."
      bazel-config: "clippy"
