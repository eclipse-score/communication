# Workflow: Clang-Tidy PR check — thin wrapper around lint.yml
#
# Kept for backward compatibility (branch-protection rules, nightly_quality.yml).
# All logic lives in lint.yml; this file simply calls it with linter: clang-tidy.

name: Clang-Tidy Check

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the clang-tidy findings artifact"
        value: ${{ jobs.run-lint.outputs.artifact-name }}
      errors:
        description: "Total clang-tidy error count"
        value: ${{ jobs.run-lint.outputs.errors }}
      warnings:
        description: "Total clang-tidy warning count"
        value: ${{ jobs.run-lint.outputs.warnings }}
      conclusion:
        description: "Job conclusion: success or failure"
        value: ${{ jobs.run-lint.outputs.conclusion }}

jobs:
  run-lint:
    uses: ./.github/workflows/lint.yml
    with:
      bazel-command: test
      bazel-config: clang-tidy
      findings-glob: "*.AspectRulesLintClangTidy.out"
      changed-files-regex: '\.(cpp|h|cc|cxx|hpp)$'
      artifact-name: clang-tidy-findings
      cache-save: ${{ github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      actions: write
