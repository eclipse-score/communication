name: "CodeQL Analysis"

on:
  workflow_call:
    inputs:
      cache-mode:
        description: "Cache mode override (empty = auto-compute from event context)."
        type: string
        default: ""
      fetch-only:
        description: "When true, runs --nobuild to fetch dependencies only."
        type: string
        default: "false"
    secrets:
      UBUNTU_SNAPSHOT_MIRROR_URL:
        required: false

jobs:
  codeql:
    name: Build & Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
      security-events: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: ./.github/actions/00_infrastructure/prepare_bazel_environment
        with:
          disk-cache: ""
          cache-mode: ${{ inputs.cache-mode }}
          ubuntu-snapshot-mirror-url: ${{ secrets.UBUNTU_SNAPSHOT_MIRROR_URL }}

      - name: Fetch dependencies (--nobuild)
        if: inputs.fetch-only == 'true'
        run: bazel build --nobuild //...

      - name: Run CodeQL analysis
        if: inputs.fetch-only != 'true'
        id: run-codeql
        run: |
          set -euo pipefail

          bazel run //quality/static_analysis:codeql_lint -- \
            --output-dir /tmp/codeql-results \
            --output-prefix codeql-nightly \
            --target //score/message_passing //score/mw/com

      - name: Upload SARIF to GitHub Code Scanning
        if: inputs.fetch-only != 'true' && always() && steps.run-codeql.outcome == 'success'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/codeql-results/codeql-nightly.sarif
          category: codeql-nightly

      - name: Upload CSV results
        if: inputs.fetch-only != 'true' && always() && steps.run-codeql.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: codeql-csv-results
          path: /tmp/codeql-results/codeql-nightly.csv
          retention-days: 30

      - name: Upload MISRA compliance reports
        if: inputs.fetch-only != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-misra-reports
          path: /tmp/codeql-results/analysis_reports/
          retention-days: 30
          if-no-files-found: warn
